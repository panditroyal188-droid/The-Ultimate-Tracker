<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prinshu's Tracker">
<meta name="theme-color" content="#060a12">
<meta name="description" content="The Prinshu's personal daily tracker with live news, horoscope, tasks & water tracker.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>The Prinshu's Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{--bg:#060a12;--surface:rgba(255,255,255,0.03);--surface2:rgba(255,255,255,0.07);--border:rgba(99,200,255,0.13);--text:#e8f4ff;--text2:#7a9ab8;--accent:#00d4ff;--accent2:#7b2fff;--accent3:#ff6b35;--glow:0 0 20px rgba(0,212,255,0.3);--glow2:0 0 30px rgba(123,47,255,0.2);--grid:rgba(0,212,255,0.04);--nav-bg:rgba(6,10,18,0.97);--horo-glow:0 0 30px rgba(123,47,255,0.4);}
:root[data-theme="light"]{--bg:#f0f6ff;--surface:rgba(255,255,255,0.8);--surface2:rgba(255,255,255,0.95);--border:rgba(0,100,200,0.15);--text:#0a1a2e;--text2:#4a6a8a;--accent:#0066cc;--accent2:#6600cc;--accent3:#cc4400;--glow:0 4px 20px rgba(0,102,204,0.15);--glow2:0 4px 20px rgba(102,0,204,0.1);--grid:rgba(0,100,200,0.04);--nav-bg:rgba(240,246,255,0.97);--horo-glow:0 4px 30px rgba(102,0,204,0.2);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:80px;transition:background 0.4s,color 0.4s;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:60px 60px;z-index:0;pointer-events:none;}
[data-theme="dark"] body::after{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 20%,rgba(0,212,255,0.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(123,47,255,0.05) 0%,transparent 50%);z-index:0;pointer-events:none;animation:aurora 12s ease-in-out infinite alternate;}
@keyframes aurora{0%{transform:rotate(0deg) scale(1)}100%{transform:rotate(5deg) scale(1.05)}}

header{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:14px 18px;padding-top:max(14px,env(safe-area-inset-top));}
.logo{font-family:'Orbitron',monospace;font-size:0.78rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px;}
.header-right{display:flex;align-items:center;gap:10px;}
.live-clock{font-family:'Orbitron',monospace;font-size:0.78rem;color:var(--accent);letter-spacing:2px;}
.theme-toggle{background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:6px 12px;cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;display:flex;align-items:center;gap:5px;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0;border:none;background:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:0.5rem;font-weight:500;letter-spacing:0.5px;}
.nav-item.active{color:var(--accent);}
.nav-item .nav-icon{font-size:1.2rem;}

.page{display:none;position:relative;z-index:1;padding:16px;}
.page.active{display:block;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--glow2);position:relative;overflow:hidden;margin-bottom:16px;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.6;}
.card-title{font-family:'Orbitron',monospace;font-size:0.6rem;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}

.save-badge{position:fixed;top:70px;right:16px;z-index:999;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:0.7rem;font-weight:600;padding:6px 14px;border-radius:20px;opacity:0;transition:opacity 0.4s;pointer-events:none;}
.save-badge.show{opacity:1;}

/* HOME */
.date-hero{text-align:center;padding:20px 0 10px;}
.date-big{font-family:'Orbitron',monospace;font-size:4rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.date-sub{font-size:0.8rem;color:var(--text2);margin-top:6px;letter-spacing:1px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;}
.stat-num{font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-label{font-size:0.62rem;color:var(--text2);margin-top:4px;letter-spacing:1px;}

/* CALENDAR */
.cal-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month{font-family:'Orbitron',monospace;font-size:0.95rem;font-weight:600;color:var(--text);}
.nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;color:var(--accent);font-size:1.1rem;display:flex;align-items:center;justify-content:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day-name{text-align:center;font-size:0.6rem;font-weight:600;color:var(--text2);padding:6px 2px;}
.cal-day{text-align:center;padding:10px 2px;border-radius:8px;font-size:0.82rem;cursor:pointer;color:var(--text2);}
.cal-day.today{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;box-shadow:var(--glow);font-family:'Orbitron',monospace;}
.cal-day.other-month{opacity:0.25;}

/* TASKS */
.task-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;margin-bottom:10px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:opacity 0.3s;}
.task-item.done{opacity:0.5;}
.task-item.done .task-text{text-decoration:line-through;color:var(--text2);}
.task-checkbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--accent);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.task-item.done .task-checkbox{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;}
.task-checkbox svg{display:none;}
.task-item.done .task-checkbox svg{display:block;}
.task-text{flex:1;font-size:0.88rem;line-height:1.35;}
.task-priority{font-size:0.6rem;padding:3px 8px;border-radius:20px;font-weight:600;letter-spacing:1px;white-space:nowrap;}
.p-high{background:rgba(255,107,53,0.15);color:var(--accent3);border:1px solid rgba(255,107,53,0.3);}
.p-med{background:rgba(0,212,255,0.1);color:var(--accent);border:1px solid rgba(0,212,255,0.2);}
.p-low{background:rgba(123,47,255,0.1);color:var(--accent2);border:1px solid rgba(123,47,255,0.2);}
.task-input-row{display:flex;gap:8px;margin-top:14px;}
.task-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;}
.task-input:focus{border-color:var(--accent);}
.add-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;padding:12px 18px;color:#fff;cursor:pointer;font-size:1.3rem;font-weight:700;}
.reset-tasks-btn{margin-top:10px;width:100%;padding:10px;border-radius:12px;border:1px solid rgba(255,107,53,0.3);background:rgba(255,107,53,0.08);color:var(--accent3);font-family:'DM Sans',sans-serif;font-size:0.8rem;cursor:pointer;font-weight:500;}

/* WATER */
.water-center{text-align:center;}
.water-amount{font-family:'Orbitron',monospace;font-size:3rem;font-weight:800;background:linear-gradient(135deg,#00d4ff,#0066ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.water-goal{font-size:0.8rem;color:var(--text2);margin-top:4px;}
.bottle-wrap{display:flex;justify-content:center;margin:20px 0;}
.bottle-outline{width:90px;height:200px;border:3px solid var(--accent);border-radius:14px 14px 18px 18px;position:relative;overflow:hidden;box-shadow:var(--glow);}
.bottle-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(0,212,255,0.7),rgba(0,100,255,0.9));transition:height 0.8s cubic-bezier(0.34,1.56,0.64,1);border-radius:0 0 15px 15px;}
.bottle-marks{position:absolute;inset:0;display:flex;flex-direction:column-reverse;justify-content:space-around;padding:6px;pointer-events:none;}
.bottle-mark{width:100%;border-top:1px dashed rgba(255,255,255,0.2);}
.water-cups{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:16px 0;}
.cup{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer;font-size:1.1rem;}
.cup.filled{background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(0,100,255,0.2));border-color:var(--accent);box-shadow:0 0 12px rgba(0,212,255,0.2);}
.cup-label{font-size:0.5rem;color:var(--text2);margin-top:3px;font-weight:500;}
.water-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.water-btn{padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:0.88rem;font-weight:500;font-family:'DM Sans',sans-serif;}
.water-btn.primary{background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(0,100,255,0.2));border-color:var(--accent);color:var(--accent);font-weight:600;}

/* NEWS */
.news-sources{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.source-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:0.72rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.source-btn.active{background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(123,47,255,0.15));border-color:var(--accent);color:var(--accent);}
.news-meta-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.news-updated{font-size:0.65rem;color:var(--text2);}
.news-refresh-btn{font-size:0.7rem;color:var(--accent);background:none;border:1px solid var(--accent);border-radius:20px;padding:4px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.news-loading{text-align:center;padding:40px 20px;color:var(--text2);}
.news-loading-spin{font-size:2rem;animation:spin 1s linear infinite;display:block;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg)}}
.affair-item{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;cursor:pointer;text-decoration:none;display:block;}
.affair-item::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--accent),var(--accent2));}
.affair-tag{font-size:0.6rem;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.affair-source{font-size:0.58rem;color:var(--text2);font-weight:500;letter-spacing:0;}
.affair-title{font-size:0.88rem;font-weight:500;line-height:1.45;margin-bottom:8px;color:var(--text);}
.affair-meta{font-size:0.7rem;color:var(--text2);display:flex;align-items:center;gap:6px;}
.affair-dot{width:5px;height:5px;border-radius:50%;background:var(--accent3);display:inline-block;flex-shrink:0;}
.news-error{background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.25);border-radius:14px;padding:16px;text-align:center;color:var(--accent3);font-size:0.85rem;}

/* HOROSCOPE */
.sign-selector{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.sign-btn{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;}
.sign-btn.selected{background:linear-gradient(135deg,rgba(123,47,255,0.25),rgba(0,212,255,0.15));border-color:var(--accent2);box-shadow:var(--horo-glow);}
.sign-emoji{font-size:1.5rem;display:block;margin-bottom:3px;}
.sign-name{font-size:0.5rem;color:var(--text2);font-weight:600;letter-spacing:0.5px;}
.sign-btn.selected .sign-name{color:var(--accent2);}
.horo-panel{display:none;}
.horo-panel.active{display:block;}
.horo-card{background:linear-gradient(135deg,rgba(123,47,255,0.08),rgba(0,212,255,0.05));border:1px solid rgba(123,47,255,0.25);border-radius:20px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;}
.horo-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent2),transparent);opacity:0.8;}
.horo-top{display:flex;align-items:center;gap:16px;margin-bottom:18px;}
.horo-sign-big{font-size:3.5rem;line-height:1;}
.horo-sign-info h2{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;color:var(--text);}
.horo-sign-info p{font-size:0.72rem;color:var(--text2);margin-top:3px;}
.horo-date-range{font-size:0.65rem;color:var(--accent2);font-weight:600;margin-top:4px;}
.horo-section-label{font-size:0.6rem;letter-spacing:2px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;}
.star-rating{color:#ffd700;font-size:1rem;letter-spacing:2px;margin-bottom:8px;}
.horo-prediction{font-size:0.9rem;line-height:1.7;color:var(--text);margin-bottom:18px;}
.horo-meters{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.horo-meter{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;}
.horo-meter-label{font-size:0.62rem;color:var(--text2);margin-bottom:6px;letter-spacing:1px;font-weight:600;}
.horo-meter-bar{height:5px;border-radius:5px;background:var(--surface);overflow:hidden;}
.horo-meter-fill{height:100%;border-radius:5px;}
.meter-love{background:linear-gradient(90deg,#ff6b9d,#ff3366);}
.meter-career{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.meter-health{background:linear-gradient(90deg,#00ff88,#00cc66);}
.meter-luck{background:linear-gradient(90deg,#ffd700,#ffaa00);}
.horo-meter-val{font-size:0.7rem;color:var(--text2);margin-top:4px;}
.horo-lucky{display:flex;gap:8px;flex-wrap:wrap;}
.horo-lucky-item{background:rgba(123,47,255,0.12);border:1px solid rgba(123,47,255,0.25);border-radius:20px;padding:5px 12px;font-size:0.72rem;color:var(--accent2);font-weight:500;}

/* STATS */
.progress-label-row{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text2);margin-bottom:6px;}
.progress-bar{height:8px;border-radius:10px;background:var(--surface);overflow:hidden;margin-bottom:16px;}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.progress-fill.water{background:linear-gradient(90deg,#00d4ff,#0066ff);}
.progress-fill.overall{background:linear-gradient(90deg,var(--accent3),var(--accent));}

/* STUDY TRACKER */
.progress-fill.study{background:linear-gradient(90deg,#a855f7,#ec4899);}
.study-timer-display{text-align:center;padding:24px 0 16px;}
.study-timer-big{font-family:'Orbitron',monospace;font-size:3.2rem;font-weight:800;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;letter-spacing:2px;}
.study-goal-text{font-size:0.78rem;color:var(--text2);margin-top:6px;}
.study-ring-wrap{display:flex;justify-content:center;margin:10px 0 20px;}
.study-controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.study-btn{padding:14px 8px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;font-size:0.78rem;font-weight:600;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:4px;}
.study-btn span{font-size:1.4rem;}
.study-btn.start{background:linear-gradient(135deg,rgba(168,85,247,0.25),rgba(236,72,153,0.15));border-color:#a855f7;color:#a855f7;}
.study-btn.pause{background:linear-gradient(135deg,rgba(255,107,53,0.2),rgba(255,150,0,0.1));border-color:var(--accent3);color:var(--accent3);}
.study-btn.stop{background:rgba(255,60,60,0.1);border-color:rgba(255,60,60,0.3);color:#ff6060;}
.study-subject-row{display:flex;gap:8px;margin-bottom:14px;}
.study-subject-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;}
.study-subject-input:focus{border-color:#a855f7;}
.study-sessions-title{font-size:0.62rem;letter-spacing:2px;color:var(--text2);margin-bottom:10px;text-transform:uppercase;}
.study-session-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.study-session-left{flex:1;}
.study-session-subject{font-size:0.85rem;font-weight:500;color:var(--text);}
.study-session-time{font-size:0.65rem;color:var(--text2);margin-top:2px;}
.study-session-dur{font-family:'Orbitron',monospace;font-size:0.8rem;color:#a855f7;font-weight:700;}
.study-empty{text-align:center;padding:20px;color:var(--text2);font-size:0.82rem;}
.study-status-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);border-radius:20px;padding:5px 12px;font-size:0.7rem;color:#a855f7;font-weight:600;margin-bottom:14px;}
.study-status-dot{width:6px;height:6px;border-radius:50%;background:#a855f7;animation:pulse 1.5s infinite;}
</style>
</head>
<body>

<div class="save-badge" id="save-badge">✓ Saved!</div>

<header>
  <div class="logo">The Prinshu's Tracker</div>
  <div class="header-right">
    <div class="live-clock" id="clock">00:00:00</div>
    <button class="theme-toggle" onclick="toggleTheme()">
      <span id="theme-icon">☀️</span><span id="theme-label">Light</span>
    </button>
  </div>
</header>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="date-hero">
    <div class="date-big" id="date-big">--</div>
    <div class="date-sub" id="date-sub">Loading...</div>
  </div>
  <div class="card">
    <div class="card-title"><span class="live-dot"></span>Today at a Glance</div>
